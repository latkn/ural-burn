# Сборка onboarding (Vite + Vue) и публикация на GitHub Pages.
# Один job = ровно один артефакт github-pages (иначе deploy-pages падает с "Multiple artifacts").
#
# Свой домен (например ural-burn.ru) открывается с КОРНЯ — нужен base "/".
# Задай в репозитории: Settings → Secrets and variables → Actions → Variables (или Secrets):
#   VITE_BASE_URL = /
# Иначе для репо ural-burn подставится /ural-burn/ (только для latkn.github.io/ural-burn/).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: onboarding/package-lock.json

      - name: Install dependencies
        working-directory: onboarding
        run: npm ci

      - name: Base path for GitHub Pages
        id: pages_base
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
          FROM_SECRET: ${{ secrets.VITE_BASE_URL }}
          FROM_VAR: ${{ vars.VITE_BASE_URL }}
        run: |
          if [ -n "$FROM_SECRET" ]; then
            echo "base=$FROM_SECRET" >> "$GITHUB_OUTPUT"
          elif [ -n "$FROM_VAR" ]; then
            echo "base=$FROM_VAR" >> "$GITHUB_OUTPUT"
          elif [ "$REPO_NAME" = "${REPO_OWNER}.github.io" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$REPO_NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        working-directory: onboarding
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CHAT_LINK: ${{ secrets.VITE_CHAT_LINK }}
          VITE_BASE_URL: ${{ steps.pages_base.outputs.base }}
        run: npm run build

      - name: SPA fallback
        working-directory: onboarding
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: onboarding/dist

      - id: deployment
        uses: actions/deploy-pages@v4
