# Сборка onboarding (Vite + Vue) и публикация на GitHub Pages.
# Netlify от этого не ломается — отдельный деплой по тому же пушу.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: onboarding/package-lock.json

      - name: Install dependencies
        working-directory: onboarding
        run: npm ci

      # Без этого base остаётся "/" — на user.github.io/ИМЯ-РЕПО/ все /assets/* дают 404 и белый экран
      - name: Base path for GitHub Pages
        id: pages_base
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
          VITE_BASE_URL_OVERRIDE: ${{ secrets.VITE_BASE_URL }}
        run: |
          if [ -n "$VITE_BASE_URL_OVERRIDE" ]; then
            echo "base=$VITE_BASE_URL_OVERRIDE" >> "$GITHUB_OUTPUT"
          elif [ "$REPO_NAME" = "${REPO_OWNER}.github.io" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$REPO_NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        working-directory: onboarding
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CHAT_LINK: ${{ secrets.VITE_CHAT_LINK }}
          VITE_BASE_URL: ${{ steps.pages_base.outputs.base }}
        run: npm run build

      # GitHub Pages отдаёт 404.html при несуществующем пути — нужно для Vue Router (history)
      - name: SPA fallback
        working-directory: onboarding
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: onboarding/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
